<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Modern Drum & Melody Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>AI Composer & Drum Machine</h1>

<div class="controls">
    <label>BPM:</label>
    <input id="bpm" type="number" value="120" min="40" max="240">
    <button id="generateMelody">Generate Melody</button>
    <button id="generateDrum">Generate Drum</button>
    <button id="play">Play</button>
    <button id="stop">Stop</button>
</div>

<div class="main-container">
    <div id="sequencer"></div>
    <h2>Melody</h2>
    <div id="pianoRoll"></div>
</div>

<script src="script.js"></script>
</body>
</html>
