<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Modern Drum & Melody Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>AI Composer & Drum Machine</h1>

<div class="controls">
    <label>BPM:</label>
    <input id="bpm" type="number" value="120" min="40" max="240">

    <label>Steps:</label>
    <select id="stepSelect">
        <option value="32" selected>32 Steps</option>
        <option value="64">64 Steps</option>
    </select>

    <button id="generateMelody">Generate Melody</button>
    <button id="generateDrum">Generate Drum</button>
    <button id="play">Play</button>
    <button id="stop">Stop</button>
</div>

<div id="keyDisplay" style="margin-bottom: 15px; font-weight: bold; color: #ffa726; font-size: 1.2em;">
    Key: Ready
</div>

<div class="save-controls">
    <h3>Save / Load Slots</h3>
    <div id="slotContainer"></div>
</div>

<div class="main-container">
    <div id="sequencer"></div>
    <h2>Melody</h2>
    <div id="pianoRoll"></div>
</div>

<script src="script.js"></script>
</body>
</html>
