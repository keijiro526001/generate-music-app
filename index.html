<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AI Composer & Drum Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>AI Composer & Drum Machine</h1>

<div class="controls">
    <label>BPM:</label>
    <input id="bpm" type="number" value="120" min="40" max="240">

    <label>Steps:</label>
    <select id="stepSelect">
        <option value="32">32 Steps</option>
        <option value="64" selected>64 Steps</option>
    </select>

    <button id="generateMelody">Generate Melody</button>
    <button id="generateDrum">Generate Drum</button>
    <button id="play">Play</button>
    <button id="stop">Stop</button>
    <button id="exportMidi" style="background-color: #673ab7;">Export MIDI</button>
</div>

<div id="infoDisplay" style="margin-bottom: 15px;">
    <span id="keyDisplay" style="font-weight: bold; color: #ffa726; font-size: 1.2em; margin-right: 20px;">Key: Ready</span>
    <span id="chordDisplay" style="font-weight: bold; color: #66bb6a; font-size: 1.2em;">Chords: -</span>
</div>

<div class="main-container">
    <div id="sequencer"></div>
    <h2>Melody</h2>
    <div id="pianoRoll"></div>
</div>

<script src="script.js"></script>
</body>
</html>
